name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

env:
  GHCR_IMAGE: ghcr.io/tousled/home-cinema-control
  DH_IMAGE: tousled/home-cinema-control

jobs:
  publish:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Extract version tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Validate release branch
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          git fetch origin main:refs/remotes/origin/main develop:refs/remotes/origin/develop --depth=1

          if [[ "$VERSION" == *-* ]]; then
            git branch -r --contains "$GITHUB_SHA" | grep -q 'origin/develop' || {
              echo "Release candidate tags must point to a commit contained in develop."
              exit 1
            }
          else
            git branch -r --contains "$GITHUB_SHA" | grep -q 'origin/main' || {
              echo "Stable release tags must point to a commit contained in main."
              exit 1
            }
          fi

      - name: Prepare Docker tags
        id: docker-tags
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          {
            echo 'tags<<EOF'
            echo "${{ env.GHCR_IMAGE }}:${VERSION}"
            echo "${{ env.DH_IMAGE }}:${VERSION}"
            if [[ "$VERSION" == *-* ]]; then
              echo "${{ env.GHCR_IMAGE }}:rc"
              echo "${{ env.DH_IMAGE }}:rc"
            else
              echo "${{ env.GHCR_IMAGE }}:latest"
              echo "${{ env.DH_IMAGE }}:latest"
            fi
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.docker-tags.outputs.tags }}
          build-args: |
            SETUPTOOLS_SCM_PRETEND_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
